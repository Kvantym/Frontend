<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1150" viewBox="0 0 1800 1150">
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .page { fill: #ffffff; stroke: #dbe4ef; stroke-width: 2; }
      .title { font: 700 34px Arial, sans-serif; fill: #0f172a; text-anchor: middle; }
      .subtitle { font: 500 17px Arial, sans-serif; fill: #64748b; text-anchor: middle; }
      .participant { fill: #eff6ff; stroke: #2563eb; stroke-width: 2.4; }
      .participant-service { fill: #ecfdf5; stroke: #16a34a; stroke-width: 2.4; }
      .participant-db { fill: #fff7ed; stroke: #ea580c; stroke-width: 2.4; }
      .ptext { font: 700 18px Arial, sans-serif; fill: #1e293b; text-anchor: middle; dominant-baseline: middle; }
      .lifeline { stroke: #94a3b8; stroke-width: 2; stroke-dasharray: 8 7; }
      .activation { fill: #f8fafc; stroke: #475569; stroke-width: 1.8; }
      .msg { stroke: #334155; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .return { stroke: #64748b; stroke-width: 2; stroke-dasharray: 8 6; fill: none; marker-end: url(#arrowLight); }
      .msg-text { font: 600 15px Arial, sans-serif; fill: #1e293b; }
      .step { fill: #2563eb; }
      .step-text { font: 700 13px Arial, sans-serif; fill: #ffffff; text-anchor: middle; dominant-baseline: middle; }
      .note { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1.6; }
      .note-text { font: 500 15px Arial, sans-serif; fill: #475569; }
      .section { fill: #f1f5f9; stroke: #dbe4ef; stroke-width: 1.4; }
      .section-text { font: 700 15px Arial, sans-serif; fill: #475569; text-anchor: middle; dominant-baseline: middle; }
    </style>
    <marker id="arrow" markerWidth="13" markerHeight="13" refX="11" refY="6.5" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L11,6.5 L2,11" fill="none" stroke="#334155" stroke-width="2"/>
    </marker>
    <marker id="arrowLight" markerWidth="13" markerHeight="13" refX="11" refY="6.5" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L11,6.5 L2,11" fill="none" stroke="#64748b" stroke-width="2"/>
    </marker>
  </defs>

  <rect class="bg" width="1800" height="1150"/>
  <rect class="page" x="55" y="40" width="1690" height="1055" rx="24"/>

  <text class="title" x="900" y="92">Діаграма послідовності створення картки</text>
  <text class="subtitle" x="900" y="123">Взаємодія користувача, Angular frontend, backend API, сервісного шару, репозиторію та бази даних</text>

  <!-- Participants -->
  <rect class="participant" x="105" y="165" width="205" height="64" rx="14"/>
  <text class="ptext" x="207.5" y="197">Користувач</text>

  <rect class="participant" x="365" y="165" width="205" height="64" rx="14"/>
  <text class="ptext" x="467.5" y="187">Angular</text>
  <text class="ptext" x="467.5" y="208">Frontend</text>

  <rect class="participant" x="625" y="165" width="205" height="64" rx="14"/>
  <text class="ptext" x="727.5" y="187">Cart</text>
  <text class="ptext" x="727.5" y="208">Controller</text>

  <rect class="participant-service" x="885" y="165" width="205" height="64" rx="14"/>
  <text class="ptext" x="987.5" y="187">Cart</text>
  <text class="ptext" x="987.5" y="208">Service</text>

  <rect class="participant-service" x="1145" y="165" width="205" height="64" rx="14"/>
  <text class="ptext" x="1247.5" y="187">Cart</text>
  <text class="ptext" x="1247.5" y="208">Repository</text>

  <rect class="participant-db" x="1405" y="165" width="205" height="64" rx="14"/>
  <text class="ptext" x="1507.5" y="187">Database</text>
  <text class="ptext" x="1507.5" y="208">EF Core</text>

  <!-- Lifelines -->
  <line class="lifeline" x1="207.5" y1="229" x2="207.5" y2="1010"/>
  <line class="lifeline" x1="467.5" y1="229" x2="467.5" y2="1010"/>
  <line class="lifeline" x1="727.5" y1="229" x2="727.5" y2="1010"/>
  <line class="lifeline" x1="987.5" y1="229" x2="987.5" y2="1010"/>
  <line class="lifeline" x1="1247.5" y1="229" x2="1247.5" y2="1010"/>
  <line class="lifeline" x1="1507.5" y1="229" x2="1507.5" y2="1010"/>

  <!-- Activations -->
  <rect class="activation" x="457.5" y="285" width="20" height="650" rx="4"/>
  <rect class="activation" x="717.5" y="365" width="20" height="445" rx="4"/>
  <rect class="activation" x="977.5" y="445" width="20" height="305" rx="4"/>
  <rect class="activation" x="1237.5" y="555" width="20" height="90" rx="4"/>
  <rect class="activation" x="1497.5" y="600" width="20" height="55" rx="4"/>

  <!-- Sections -->
  <rect class="section" x="95" y="250" width="1620" height="36" rx="10"/>
  <text class="section-text" x="900" y="268">Формування запиту на створення картки</text>

  <rect class="section" x="95" y="405" width="1620" height="36" rx="10"/>
  <text class="section-text" x="900" y="423">Обробка запиту на backend</text>

  <rect class="section" x="95" y="760" width="1620" height="36" rx="10"/>
  <text class="section-text" x="900" y="778">Повернення результату та оновлення інтерфейсу</text>

  <!-- Messages -->
  <circle class="step" cx="110" cy="320" r="13"/>
  <text class="step-text" x="110" y="320">1</text>
  <line class="msg" x1="207.5" y1="320" x2="457.5" y2="320"/>
  <text class="msg-text" x="230" y="304">Заповнення форми створення картки</text>

  <circle class="step" cx="370" cy="380" r="13"/>
  <text class="step-text" x="370" y="380">2</text>
  <line class="msg" x1="477.5" y1="380" x2="717.5" y2="380"/>
  <text class="msg-text" x="500" y="364">HTTP POST /cart/create-cart/{'{listCartId}'}</text>

  <circle class="step" cx="630" cy="465" r="13"/>
  <text class="step-text" x="630" y="465">3</text>
  <line class="msg" x1="737.5" y1="465" x2="977.5" y2="465"/>
  <text class="msg-text" x="760" y="449">Передача DTO у сервісний шар</text>

  <circle class="step" cx="890" cy="525" r="13"/>
  <text class="step-text" x="890" y="525">4</text>
  <path class="msg" d="M997.5 525 C1060 505, 1060 555, 997.5 540"/>
  <text class="msg-text" x="1020" y="504">Валідація даних</text>
  <text class="msg-text" x="1020" y="524">і формування Cart</text>

  <circle class="step" cx="1130" cy="585" r="13"/>
  <text class="step-text" x="1130" y="585">5</text>
  <line class="msg" x1="997.5" y1="585" x2="1237.5" y2="585"/>
  <text class="msg-text" x="1020" y="569">SaveCart(cart)</text>

  <line class="msg" x1="1257.5" y1="625" x2="1497.5" y2="625"/>
  <text class="msg-text" x="1280" y="609">INSERT Cart</text>

  <line class="return" x1="1497.5" y1="675" x2="1257.5" y2="675"/>
  <text class="msg-text" x="1330" y="699">CartId</text>

  <line class="return" x1="1237.5" y1="715" x2="997.5" y2="715"/>
  <text class="msg-text" x="1065" y="739">збережена картка</text>

  <circle class="step" cx="890" cy="700" r="13"/>
  <text class="step-text" x="890" y="700">6</text>
  <path class="msg" d="M997.5 700 C1060 680, 1060 730, 997.5 715"/>
  <text class="msg-text" x="1020" y="674">Створення запису</text>
  <text class="msg-text" x="1020" y="694">ActivityCart</text>

  <circle class="step" cx="630" cy="835" r="13"/>
  <text class="step-text" x="630" y="835">7</text>
  <line class="return" x1="977.5" y1="835" x2="737.5" y2="835"/>
  <text class="msg-text" x="785" y="819">результат виконання</text>

  <line class="return" x1="717.5" y1="885" x2="477.5" y2="885"/>
  <text class="msg-text" x="515" y="869">HTTP 200 / 201 Created</text>

  <circle class="step" cx="370" cy="935" r="13"/>
  <text class="step-text" x="370" y="935">8</text>
  <path class="msg" d="M477.5 935 C540 915, 540 965, 477.5 950"/>
  <text class="msg-text" x="500" y="918">Оновлення списку карток</text>
  <text class="msg-text" x="500" y="938">та інтерфейсу</text>

  <line class="return" x1="457.5" y1="990" x2="207.5" y2="990"/>
  <text class="msg-text" x="245" y="974">Відображення нової картки</text>

  <!-- Note -->
  <rect class="note" x="95" y="1030" width="900" height="42" rx="10"/>
  <text class="note-text" x="115" y="1056">Примітка: запит до backend API виконується із JWT-токеном у заголовку Authorization.</text>
</svg>
