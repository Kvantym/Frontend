<svg xmlns="http://www.w3.org/2000/svg" width="1700" height="1100" viewBox="0 0 1700 1100">
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .page { fill: #ffffff; stroke: #dbe4ef; stroke-width: 2; }
      .title { font: 700 34px Arial, sans-serif; fill: #0f172a; text-anchor: middle; }
      .subtitle { font: 500 17px Arial, sans-serif; fill: #64748b; text-anchor: middle; }
      .layer { stroke-width: 2.5; }
      .frontend { fill: #eff6ff; stroke: #2563eb; }
      .api { fill: #ecfdf5; stroke: #16a34a; }
      .service { fill: #fefce8; stroke: #ca8a04; }
      .repo { fill: #fff7ed; stroke: #ea580c; }
      .data { fill: #f8fafc; stroke: #475569; }
      .external { fill: #f5f3ff; stroke: #7c3aed; }
      .layer-title { font: 700 24px Arial, sans-serif; fill: #0f172a; text-anchor: middle; }
      .layer-text { font: 500 17px Arial, sans-serif; fill: #334155; text-anchor: middle; }
      .tech { font: 700 16px Arial, sans-serif; fill: #475569; text-anchor: middle; }
      .arrow { stroke: #475569; stroke-width: 2.6; fill: none; marker-end: url(#arrow); }
      .arrow-dash { stroke: #64748b; stroke-width: 2.4; fill: none; stroke-dasharray: 8 6; marker-end: url(#arrow); }
      .label { font: 700 15px Arial, sans-serif; fill: #475569; text-anchor: middle; }
      .boundary { fill: none; stroke: #cbd5e1; stroke-width: 2; stroke-dasharray: 10 8; }
      .boundary-title { font: 700 18px Arial, sans-serif; fill: #64748b; }
      .legend { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1.6; }
      .legend-text { font: 500 15px Arial, sans-serif; fill: #475569; dominant-baseline: middle; }
    </style>
    <marker id="arrow" markerWidth="13" markerHeight="13" refX="11" refY="6.5" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L11,6.5 L2,11" fill="none" stroke="#475569" stroke-width="2"/>
    </marker>
  </defs>

  <rect class="bg" width="1700" height="1100"/>
  <rect class="page" x="55" y="40" width="1590" height="1010" rx="24"/>

  <text class="title" x="850" y="92">Архітектура системи</text>
  <text class="subtitle" x="850" y="123">Багаторівнева структура системи управління завданнями з AI-чатом</text>

  <rect class="boundary" x="145" y="155" width="980" height="790" rx="22"/>
  <text class="boundary-title" x="175" y="190">Основна система</text>

  <!-- Layers -->
  <rect class="layer frontend" x="230" y="210" width="810" height="105" rx="18"/>
  <text class="layer-title" x="635" y="245">Frontend-рівень</text>
  <text class="layer-text" x="635" y="276">Angular-застосунок, компоненти, сервіси, NgRx, локальний стан</text>
  <text class="tech" x="635" y="300">UI користувача</text>

  <rect class="layer api" x="230" y="365" width="810" height="105" rx="18"/>
  <text class="layer-title" x="635" y="400">API-рівень</text>
  <text class="layer-text" x="635" y="431">ASP.NET Core Controllers приймають HTTP-запити</text>
  <text class="tech" x="635" y="455">REST API + JWT-захист</text>

  <rect class="layer service" x="230" y="520" width="810" height="105" rx="18"/>
  <text class="layer-title" x="635" y="555">Сервісний рівень</text>
  <text class="layer-text" x="635" y="586">Бізнес-логіка роботи з дошками, списками, картками, коментарями</text>
  <text class="tech" x="635" y="610">перевірка даних, правила системи, активність</text>

  <rect class="layer repo" x="230" y="675" width="810" height="105" rx="18"/>
  <text class="layer-title" x="635" y="710">Репозиторний рівень</text>
  <text class="layer-text" x="635" y="741">Репозиторії забезпечують доступ до сутностей системи</text>
  <text class="tech" x="635" y="765">CRUD-операції</text>

  <rect class="layer data" x="230" y="830" width="810" height="90" rx="18"/>
  <text class="layer-title" x="635" y="864">Рівень даних</text>
  <text class="layer-text" x="635" y="895">Entity Framework Core та база даних</text>

  <!-- External Gemini -->
  <rect class="boundary" x="1210" y="295" width="330" height="300" rx="22"/>
  <text class="boundary-title" x="1240" y="330">Зовнішній сервіс</text>

  <rect class="layer external" x="1255" y="375" width="240" height="125" rx="18"/>
  <text class="layer-title" x="1375" y="416">Gemini API</text>
  <text class="layer-text" x="1375" y="448">AI-чат</text>
  <text class="tech" x="1375" y="475">обробка запитів користувача</text>

  <!-- Arrows main -->
  <line class="arrow" x1="635" y1="315" x2="635" y2="365"/>
  <text class="label" x="690" y="345">HTTP</text>

  <line class="arrow" x1="635" y1="470" x2="635" y2="520"/>
  <text class="label" x="710" y="500">DTO / команди</text>

  <line class="arrow" x1="635" y1="625" x2="635" y2="675"/>
  <text class="label" x="700" y="655">виклик методів</text>

  <line class="arrow" x1="635" y1="780" x2="635" y2="830"/>
  <text class="label" x="700" y="810">EF Core</text>

  <!-- Return arrows -->
  <path class="arrow-dash" d="M500 830 L500 785"/>
  <path class="arrow-dash" d="M500 675 L500 630"/>
  <path class="arrow-dash" d="M500 520 L500 475"/>
  <path class="arrow-dash" d="M500 365 L500 320"/>
  <text class="label" x="425" y="590" transform="rotate(-90 425 590)">відповіді та дані</text>

  <!-- Gemini arrows -->
  <path class="arrow" d="M1040 418 C1115 418, 1165 418, 1255 418"/>
  <text class="label" x="1145" y="398">запит до AI</text>
  <path class="arrow-dash" d="M1255 462 C1165 462, 1115 462, 1040 462"/>
  <text class="label" x="1145" y="492">AI-відповідь</text>

  <!-- User -->
  <g transform="translate(85 250)">
    <circle cx="35" cy="20" r="18" fill="none" stroke="#0f172a" stroke-width="3"/>
    <line x1="35" y1="38" x2="35" y2="92" stroke="#0f172a" stroke-width="3" stroke-linecap="round"/>
    <line x1="5" y1="58" x2="65" y2="58" stroke="#0f172a" stroke-width="3" stroke-linecap="round"/>
    <line x1="35" y1="92" x2="10" y2="130" stroke="#0f172a" stroke-width="3" stroke-linecap="round"/>
    <line x1="35" y1="92" x2="60" y2="130" stroke="#0f172a" stroke-width="3" stroke-linecap="round"/>
    <text x="35" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" font-weight="700" fill="#0f172a">Користувач</text>
  </g>

  <line class="arrow" x1="155" y1="330" x2="230" y2="262"/>
  <text class="label" x="180" y="285">взаємодія</text>

  <!-- Legend -->
  <rect class="legend" x="190" y="970" width="940" height="48" rx="12"/>
  <circle cx="225" cy="994" r="9" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text class="legend-text" x="243" y="994">клієнтський рівень</text>
  <circle cx="425" cy="994" r="9" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/>
  <text class="legend-text" x="443" y="994">API</text>
  <circle cx="520" cy="994" r="9" fill="#fefce8" stroke="#ca8a04" stroke-width="2"/>
  <text class="legend-text" x="538" y="994">бізнес-логіка</text>
  <circle cx="705" cy="994" r="9" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text class="legend-text" x="723" y="994">доступ до даних</text>
  <circle cx="915" cy="994" r="9" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
  <text class="legend-text" x="933" y="994">зовнішній AI-сервіс</text>
</svg>
